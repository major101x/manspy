services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mantle_watchdog
      POSTGRES_USER: watchdog
      POSTGRES_PASSWORD: watchdog_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pgdata:
